        </h2>

        <div class="max-w-5xl mx-auto bg-white border border-gray-200 rounded-3xl shadow-xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">

            <!-- LEFT PANEL -->

                    <button class="text-gray-400 text-sm">Cookie settings</button>

            <div class="w-full md:w-1/2 p-10 flex flex-col">

                <h4 class="text-xl font-bold text-gray-900 mb-8 text-left">Select a Date & Time</h4>

                    <button onclick="changeMonth(-1)" class="w-10 h-10 flex items-center justify-center text-blue-600 hover:bg-blue-50 rounded-full">

<i class="fas fa-chevron-right text-sm"></i>

                    <select class="text-sm font-bold text-gray-700">
<option>Bangladesh Time</option>
<option>Eastern Time</option>
<option>Central Time</option>
<option>Pacific Time</option>
</select>

        </div>
    </div>
</section>
<script>
    window.initCalendar = function() {
        let currentDate = new Date();
        const calendarDays = document.getElementById("calendarDays");
        const monthDisplay = document.getElementById("monthDisplay");

        const months = [
            "January", "February", "March", "April", "May", "June",
            "July", "August", "September", "October", "November", "December"
        ];

        // 1. Define the changeMonth function so the buttons work
        window.changeMonth = function(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            renderCalendar();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthDisplay.textContent = months[month] + " " + year;
            calendarDays.innerHTML = "";

            const firstDay = new Date(year, month, 1).getDay();
            const totalDays = new Date(year, month + 1, 0).getDate();

            // Add empty slots for the beginning of the month
            for (let i = 0; i < firstDay; i++) {
                calendarDays.innerHTML += `<div></div>`;
            }

            // Render each day as a button
            for (let day = 1; day <= totalDays; day++) {
                calendarDays.innerHTML += `
                    <div class="flex items-center justify-center">
                        <button class="w-10 h-10 rounded-full font-bold text-blue-600 hover:bg-blue-50">
                            ${day}
                        </button>
                    </div>`;
            }
        }

        // 2. IMPORTANT: Call the function to display the calendar immediately
        renderCalendar();
    };

    // Ensure initialization runs if the component is loaded
    initCalendar();
</script>
