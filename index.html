<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Fintrixx</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#ff9e00',
                        dark: '#1a1a1a'
                    },
                    fontFamily: {
                        sans: ['Oswald', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        html {
            scroll-behavior: smooth;
        }
        
        .btn-shadow {
            box-shadow: 3px 3px 0px 0px rgba(0, 0, 0, 1);
        }
        
        .btn-shadow:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px rgba(0, 0, 0, 1);
        }
    </style>
</head>

<body class="font-sans antialiased bg-white overflow-x-hidden">

    <div id="hero-section"></div>
    <div id="about-section"></div>
    <div id="why-us-section"></div>

    <script>
        // Function to fetch an HTML file and inject it into a div
        async function loadComponent(elementId, filePath) {
            try {
                const response = await fetch(filePath);
                if (!response.ok) throw new Error("File not found");
                const html = await response.text();
                document.getElementById(elementId).innerHTML = html;
            } catch (error) {
                console.error(`Error loading ${filePath}:`, error);
            }
        }

        // Load all your sections in order!
        loadComponent("hero-section", "hero.html");
        loadComponent("about-section", "about.html");
    </script>

</body>

</html>
