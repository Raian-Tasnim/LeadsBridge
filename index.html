<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Fintrixx</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: '#ff9e00',
                        dark: '#1a1a1a',
                    },
                    fontFamily: {
                        sans: ['Oswald', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* button shadow */
        
        .btn-shadow {
            box-shadow: 3px 3px 0px 0px rgba(0, 0, 0, 1);
        }
        
        .btn-shadow:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px rgba(0, 0, 0, 1);
        }
    </style>
</head>

<body class="font-sans antialiased bg-gradient-to-b from-white via-[#fff8eb] to-[#ffe8bd] min-h-screen flex flex-col relative border-t-2 border-teal-500 overflow-x-hidden">

    <div class="w-full flex justify-center z-20">
        <nav class="w-full max-w-[1440px] flex justify-between items-center px-8 py-5">
            <a href="index.html" class="flex items-center gap-2">
                <img src="your-logo.png" alt="Fintrixx Logo" class="h-10 w-auto">
            </a>

            <div class="hidden md:flex items-center space-x-8 text-lg font-medium ml-auto mr-8">
                <a href="services.html" class="text-gray-600 hover:text-brand transition">Services</a>
                <a href="about.html" class="text-gray-600 hover:text-brand transition">About</a>
                <a href="contact.html" class="text-gray-600 hover:text-brand transition">Contact</a>
            </div>
            <a href="#" class="bg-brand text-white px-6 py-2.5 rounded-full text-sm font-semibold border border-black btn-shadow transition-all tracking-wide">
                Book a Free Consultation
            </a>
        </nav>
    </div>

    <main class="flex-grow flex flex-col justify-center items-center text-center relative z-10 w-full py-20 lg:py-0">

        <div class="p-10 relative flex flex-col items-center justify-center w-full max-w-4xl mx-auto">

            <div class="px-4 py-1.5 rounded text-sm font-medium text-gray-800 mb-8 inline-flex items-center gap-2 tracking-wide">
                <span class="bg-brand flex items-center justify-center rounded w-6 h-6">
                    <img src="amazon.png" alt="Amazon Logo" class="w-4 h-4 object-contain">
                </span> Your Full-Service <span class="text-brand">Amazon Partner</span>
            </div>

            <h1 class="text-5xl md:text-7xl font-bold text-dark leading-[1.2] mb-10 w-full relative z-30 uppercase tracking-tight">
                Turn Your Amazon Struggles <br> into Success—Save Time, <br>
                <span class="text-brand">Maximize Profits!</span>
            </h1>

            <div class="relative z-30">
                <a href="#" class="bg-brand text-white px-10 py-4 rounded-full text-lg font-semibold border border-black btn-shadow transition-all inline-block tracking-wide">
                    Book a Free Consultation
                </a>
            </div>

        </div>

        <div class="hidden lg:block absolute left-4 lg:left-8 xl:left-12 2xl:left-16 top-[35%] bg-white p-5 rounded-2xl shadow-xl w-56 -rotate-[10deg] border border-gray-100 z-10">
            <h4 class="text-left font-semibold text-base text-gray-800 mb-4 tracking-wide">Total Incomes</h4>
            <div class="flex items-end justify-between h-20 gap-2 px-1">
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-gray-200 h-8 rounded-full"></div>
                    <span class="text-[10px] text-gray-400 font-medium uppercase">Jan</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-gray-200 h-12 rounded-full"></div>
                    <span class="text-[10px] text-gray-400 font-medium uppercase">Feb</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-gray-200 h-10 rounded-full"></div>
                    <span class="text-[10px] text-gray-400 font-medium uppercase">Mar</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-brand h-16 rounded-full"></div>
                    <span class="text-[10px] text-brand font-medium uppercase">Apr</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-gray-200 h-6 rounded-full"></div>
                    <span class="text-[10px] text-gray-400 font-medium uppercase">May</span>
                </div>
                <div class="flex flex-col items-center gap-2">
                    <div class="w-3.5 bg-gray-200 h-14 rounded-full"></div>
                    <span class="text-[10px] text-gray-400 font-medium uppercase">Jun</span>
                </div>
            </div>
        </div>

        <div class="hidden lg:flex absolute right-4 lg:right-8 xl:right-12 2xl:right-16 top-[40%] bg-white px-6 py-4 rounded-2xl shadow-[0_10px_40px_rgba(0,0,0,0.08)] items-center gap-5 rotate-[10deg] border border-gray-50 z-10">

            <div class="flex -space-x-3 shrink-0">
                <img src="https://i.pravatar.cc/100?img=11" alt="User" class="w-12 h-12 rounded-full border-[3px] border-[#fff8eb] object-cover shadow-sm z-10">
                <img src="https://i.pravatar.cc/100?img=12" alt="User" class="w-12 h-12 rounded-full border-[3px] border-[#fff8eb] object-cover shadow-sm z-20">
                <img src="https://i.pravatar.cc/100?img=13" alt="User" class="w-12 h-12 rounded-full border-[3px] border-[#fff8eb] object-cover shadow-sm z-30">
            </div>

            <div class="flex flex-col text-left">
                <p class="text-2xl font-bold text-black leading-none tracking-wide mb-1">45k+ Users</p>
                <div class="flex items-center gap-1.5 text-base font-medium text-gray-600">
                    <i class="fa-solid fa-star text-brand"></i> 4.7 Rating
                </div>
            </div>

        </div>

    </main>

</body>

</html>
